services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CALLSHEET_HOST=${CALLSHEET_HOST}
    depends_on:
      - ui

  ui:
    image: ghcr.io/${IMAGE_OWNER}/callsheet-ui:latest
    # Not exposed to the host — all traffic reaches the UI through Caddy
    restart: unless-stopped
    depends_on:
      - api

  api:
    image: ghcr.io/${IMAGE_OWNER}/callsheet-api:latest
    # Not exposed to the host — all traffic reaches the API through the Nginx proxy in the ui container
    restart: unless-stopped
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}

volumes:
  caddy_data:
  caddy_config:
